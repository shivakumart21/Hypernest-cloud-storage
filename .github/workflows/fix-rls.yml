name: Fix Supabase Security RLS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  fix-rls:
    runs-on: ubuntu-latest
    steps:
      - name: Run SQL Fix via Postgres
        run: |
          sudo apt-get install -y postgresql-client
          PGPASSWORD='Shivakumar21*05*05t' psql -h db.xozztctahqweeclgsovy.supabase.co -p 5432 -U postgres -d postgres -c "
            -- Enable RLS on storage if not already
            ALTER TABLE storage.objects ENABLE ROW LEVEL SECURITY;

            -- Drop old policies to avoid duplicates
            DROP POLICY IF EXISTS 'Allow All' ON storage.objects;
            DROP POLICY IF EXISTS 'Allow authenticated users to upload files' ON storage.objects;
            DROP POLICY IF EXISTS 'Allow users to update own files' ON storage.objects;
            DROP POLICY IF EXISTS 'Allow users to view their own files' ON storage.objects;
            DROP POLICY IF EXISTS 'Allow users to delete their own files' ON storage.objects;

            -- Create a 'God Mode' policy for your dev environment
            CREATE POLICY 'Allow All' ON storage.objects FOR ALL USING (bucket_id = 'user-files') WITH CHECK (bucket_id = 'user-files');
          "
