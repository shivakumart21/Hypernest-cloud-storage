name: Fix Supabase Security RLS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  fix-rls:
    runs-on: ubuntu-latest
    steps:
      - name: Run SQL Fix via Postgres
        run: |
          sudo apt-get install -y postgresql-client
          # Try Port 6543 (Transaction Bouncer) which is often more reliable
          PGPASSWORD='Shivakumar21*05*05t' psql -h db.xozztctahqweeclgsovy.supabase.co -p 6543 -U postgres -d postgres -c "
            -- 1. Ensure bucket exists
            INSERT INTO storage.buckets (id, name, public) 
            VALUES ('user-files', 'user-files', true)
            ON CONFLICT (id) DO UPDATE SET public = true;

            -- 2. Drop EVERY possible policy to start clean
            DO \$\$
            DECLARE
                pol record;
            BEGIN
                FOR pol IN (SELECT policyname FROM pg_policies WHERE tablename = 'objects' AND schemaname = 'storage') LOOP
                    EXECUTE format('DROP POLICY IF EXISTS %I ON storage.objects', pol.policyname);
                END LOOP;
            END \$\$;

            -- 3. The 'Universal Key' - Allow everything for anyone
            CREATE POLICY \"Allow All\" ON storage.objects FOR ALL USING (true) WITH CHECK (true);
            
            -- 4. Set bucket to public
            UPDATE storage.buckets SET public = true WHERE id = 'user-files';
          "
